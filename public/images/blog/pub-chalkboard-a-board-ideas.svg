<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#006064"/>
      <stop offset="100%" stop-color="#004D50"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="100" cy="530" r="180" fill="#EA580C" opacity="0.08"/>
  <circle cx="1100" cy="100" r="220" fill="#FF6B35" opacity="0.06"/>
  <!-- A-Board shape -->
  <g transform="translate(440, 80)">
    <!-- Board legs -->
    <line x1="40" y1="0" x2="0" y2="460" stroke="#2D2D2D" stroke-width="8" stroke-linecap="round"/>
    <line x1="280" y1="0" x2="320" y2="460" stroke="#2D2D2D" stroke-width="8" stroke-linecap="round"/>
    <!-- Board frame -->
    <rect x="20" y="20" width="280" height="360" rx="6" fill="#1A1A1A" stroke="#3A3A3A" stroke-width="3"/>
    <!-- Inner chalk area -->
    <rect x="35" y="35" width="250" height="330" rx="4" fill="#222222"/>
    <!-- Chalk text -->
    <text x="160" y="90" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#FFFFFF" letter-spacing="1">TODAY</text>
    <line x1="80" y1="105" x2="240" y2="105" stroke="#EA580C" stroke-width="2"/>
    <text x="160" y="145" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#F5DEB3">Fish &amp; Chips</text>
    <text x="160" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#F5DEB3">Friday</text>
    <text x="160" y="220" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#AAAAAA">Battered to order</text>
    <!-- Small pint glass doodle -->
    <rect x="140" y="250" width="30" height="45" rx="3" fill="none" stroke="#F5DEB3" stroke-width="2"/>
    <rect x="135" y="245" width="40" height="8" rx="2" fill="none" stroke="#F5DEB3" stroke-width="2"/>
    <ellipse cx="155" cy="275" rx="10" ry="4" fill="#EA580C" opacity="0.4"/>
    <!-- Arrow pointing in -->
    <text x="160" y="330" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#EA580C" font-weight="bold">Come on in!</text>
    <!-- Hinge at top -->
    <rect x="145" y="-5" width="30" height="12" rx="3" fill="#5A5A5A"/>
  </g>
  <!-- Title text -->
  <text x="60" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF">Chalkboard &amp; A-Board Ideas</text>
  <text x="60" y="598" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#EA580C">orangejelly.co.uk</text>
</svg>
